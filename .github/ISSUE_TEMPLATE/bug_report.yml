name: Bug report
description: Something isn't working as expected
labels: [bug]
body:
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: What did you expect, and what happened instead?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open Keyholdr
        2. ...
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Keyholdr version
      description: "`keyholdr --version`, or About in the menu bar app"
      placeholder: 1.5.0
    validations:
      required: true

  - type: input
    id: macos-version
    attributes:
      label: macOS / Windows version and chip
      placeholder: macOS 15.4, Apple Silicon
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant log output
      description: Console.app logs for "Keyholdr", or CLI output, if any
      render: shell
