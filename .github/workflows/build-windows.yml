name: Build KeyHolder Windows Standalone EXE

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch: # Allows manually triggering the build from the Actions tab on GitHub

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup .NET SDK
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Restore Dependencies
      run: dotnet restore windows/KeyHolder/KeyHolder.csproj

    - name: Compile and Publish Standalone EXE
      run: |
        dotnet publish windows/KeyHolder/KeyHolder.csproj -c Release -o publish

    - name: Upload Standalone EXE
      uses: actions/upload-artifact@v4
      with:
        name: KeyHolder-Windows-Standalone
        path: publish/KeyHolder.exe
