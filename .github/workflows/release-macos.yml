name: Build macOS Release

# Signing and notarization run only when the repository has the signing
# secrets configured (see "Signing" steps below); otherwise the zip is
# uploaded unsigned, matching the current right-click-to-open install flow.
#
# Required secrets for signed builds:
#   MACOS_CERT_P12          base64 of the Developer ID Application .p12
#   MACOS_CERT_PASSWORD     password protecting the .p12
#   MACOS_SIGNING_IDENTITY  e.g. "Developer ID Application: Name (TEAMID)"
#   APPLE_ID                Apple ID email used for notarization
#   APPLE_TEAM_ID           10-character team ID
#   APPLE_APP_PASSWORD      app-specific password for notarytool
#
# Required secret for automatic Homebrew tap updates:
#   TAP_DEPLOY_KEY          private half of an SSH deploy key that has
#                           write access on OlixIgnacious/homebrew-tap

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing release tag to attach the macOS build to"
        required: true
        default: "v1.0.0"
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-macos:
    runs-on: macos-latest
    env:
      HAS_SIGNING: ${{ secrets.MACOS_CERT_P12 != '' }}
      HAS_TAP_KEY: ${{ secrets.TAP_DEPLOY_KEY != '' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build app bundle
        run: ./build.sh --no-launch

      - name: Import Developer ID certificate
        if: env.HAS_SIGNING == 'true'
        env:
          MACOS_CERT_P12: ${{ secrets.MACOS_CERT_P12 }}
          MACOS_CERT_PASSWORD: ${{ secrets.MACOS_CERT_PASSWORD }}
        run: |
          KEYCHAIN_PASSWORD=$(uuidgen)
          echo "$MACOS_CERT_P12" | base64 --decode > cert.p12
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security import cert.p12 -k build.keychain -P "$MACOS_CERT_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" build.keychain
          rm cert.p12

      - name: Sign
        if: env.HAS_SIGNING == 'true'
        env:
          MACOS_SIGNING_IDENTITY: ${{ secrets.MACOS_SIGNING_IDENTITY }}
        run: |
          codesign --force --options runtime --timestamp \
            --sign "$MACOS_SIGNING_IDENTITY" build/Keyholdr.app/Contents/MacOS/keyholdr-cli
          codesign --force --options runtime --timestamp \
            --sign "$MACOS_SIGNING_IDENTITY" build/Keyholdr.app
          codesign --verify --strict --verbose=2 build/Keyholdr.app

      - name: Notarize and staple
        if: env.HAS_SIGNING == 'true'
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
        run: |
          ditto -c -k --keepParent build/Keyholdr.app notarize.zip
          xcrun notarytool submit notarize.zip \
            --apple-id "$APPLE_ID" \
            --team-id "$APPLE_TEAM_ID" \
            --password "$APPLE_APP_PASSWORD" \
            --wait
          xcrun stapler staple build/Keyholdr.app
          rm notarize.zip

      - name: Package
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          ditto -c -k --keepParent build/Keyholdr.app "Keyholdr-macOS-$TAG.zip"
          ls -lh "Keyholdr-macOS-$TAG.zip"

      - name: Upload to GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          gh release upload "$TAG" "Keyholdr-macOS-$TAG.zip" --clobber

      - name: Update Homebrew tap
        if: env.HAS_TAP_KEY == 'true'
        env:
          TAP_DEPLOY_KEY: ${{ secrets.TAP_DEPLOY_KEY }}
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          VERSION="${TAG#v}"
          SHA=$(shasum -a 256 "Keyholdr-macOS-$TAG.zip" | cut -d' ' -f1)
          KEY_FILE=$(mktemp)
          echo "$TAP_DEPLOY_KEY" > "$KEY_FILE"
          chmod 600 "$KEY_FILE"
          export GIT_SSH_COMMAND="ssh -i $KEY_FILE -o StrictHostKeyChecking=accept-new"
          git clone --depth 1 git@github.com:OlixIgnacious/homebrew-tap.git tap
          cd tap
          sed -i '' -E "s|^  version \".*\"|  version \"$VERSION\"|" Casks/keyholdr.rb
          sed -i '' -E "s|^  sha256 \".*\"|  sha256 \"$SHA\"|" Casks/keyholdr.rb
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git diff --quiet && { echo "cask already up to date"; exit 0; }
          git commit -am "keyholdr $VERSION"
          git push
