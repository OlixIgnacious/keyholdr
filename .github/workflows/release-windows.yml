name: Build Windows Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing release tag to attach the Windows build to"
        required: true
        default: "v1.0.0"
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Publish self-contained single-file exe
        run: dotnet publish windows/KeyHolder/KeyHolder.csproj -c Release -o publish

      - name: Package
        shell: pwsh
        run: |
          $tag = "${{ github.event.inputs.tag || github.ref_name }}"
          Compress-Archive -Path publish/KeyHolder.exe -DestinationPath "KeyHolder-windows-x64-$tag.zip"
          Get-Item "KeyHolder-windows-x64-$tag.zip" | Format-List Name, Length

      - name: Upload to GitHub release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = "${{ github.event.inputs.tag || github.ref_name }}"
          gh release upload $tag "KeyHolder-windows-x64-$tag.zip" --clobber
